name: Compiler le rapport PDF

# Déclenché uniquement quand des fichiers LaTeX changent, ou manuellement
on:
  push:
    branches: [main]
    paths:
      - 'rapport/**'
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Compiler le PDF avec LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: rapport/main.tex
          work_in_root_file_dir: true  # cd dans rapport/ avant de compiler

      - name: Renommer le PDF
        run: cp rapport/main.pdf rapport/rapport-performance-academique-efrei.pdf

      - name: Sauvegarder comme artefact (30 jours)
        uses: actions/upload-artifact@v4
        with:
          name: rapport-performance-academique-efrei
          path: rapport/rapport-performance-academique-efrei.pdf
          retention-days: 30

      - name: Mettre à jour la release "latest"
        uses: ncipollo/release-action@v1
        with:
          artifacts: "rapport/rapport-performance-academique-efrei.pdf"
          tag: latest
          name: "Rapport – Dernière version compilée"
          body: |
            PDF compilé automatiquement depuis la branche `main`.

            **Cliquez sur `rapport-performance-academique-efrei.pdf` ci-dessous pour télécharger.**
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
